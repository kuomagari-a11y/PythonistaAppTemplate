name: "Bundle iOS App"

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install the Apple certificate and provisioning profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: "temporary_password"
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

        echo "BUILD_CERTIFICATE_BASE64 length: ${#BUILD_CERTIFICATE_BASE64}"
        echo "BUILD_PROVISION_PROFILE_BASE64 length: ${#BUILD_PROVISION_PROFILE_BASE64}"
        ls -la $CERTIFICATE_PATH $PP_PATH

        set +e

        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        echo ">>> create-keychain exit: $?"
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        echo ">>> set-keychain-settings exit: $?"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        echo ">>> unlock-keychain exit: $?"

        security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12
        echo ">>> security import exit: $?"

        security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | sed s/\"//g)
        echo ">>> list-keychain exit: $?"
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        echo ">>> set-key-partition-list exit: $?"

        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
        echo ">>> cp profile exit: $?"

        security cms -D -i $PP_PATH -o /tmp/profile.plist
        echo ">>> security cms -D exit: $?"
        echo "----- decoded plist (head) -----"
        head -c 500 /tmp/profile.plist
        echo ""
        echo "----- decoded plist end -----"

        security find-identity -v -p codesigning "$KEYCHAIN_PATH"
        echo ">>> find-identity exit: $?"

        set -e

        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
        TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist)
        SIGN_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -n 1 | sed -E 's/.*"(.*)"/\1/')

        echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
        echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
        echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> $GITHUB_ENV

    - name: Build .app
      run: |
        xcodebuild \
          -project PythonistaAppTemplate.xcodeproj \
          -target "My App" \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
          PROVISIONING_PROFILE="$PROFILE_UUID" \
          DEVELOPMENT_TEAM="$TEAM_ID" \
          PRODUCT_BUNDLE_IDENTIFIER="${{ secrets.BUNDLE_IDENTIFIER }}" \
          build

    - name: Package IPA
      run: |
        APP_PATH=$(find build/Build/Products -maxdepth 2 -name "*.app")
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r PythonistaAppTemplate.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: PythonistaAppTemplate.ipa
