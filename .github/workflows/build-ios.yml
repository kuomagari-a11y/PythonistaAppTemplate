name: "Bundle iOS App"

on:
  push:
    branches: [ "main" ] # mainブランチにプッシュされたら起動

jobs:
  build:
    runs-on: macos-latest # クラウド上のMacを使用する指定

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Apple証明書とプロファイルをクラウドMacにインストール
    - name: Install the Apple certificate and provisioning profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: "temporary_password"
      run: |
        # パス定義
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # Base64からデコードしてファイル復元
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

        # 一時的なキーチェーンを作成して証明書をインポート
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12
        security list-keychain -d user -s $KEYCHAIN_PATH

        # プロビジョニングプロファイルを配置
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

    # 2. 環境構築（例: Flutterの場合）
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: x64

    # 3. 依存関係の解決
    - name: Install dependencies
      run: flutter pub get

    # 4. IPAファイルのビルド
    - name: Build IPA
      run: flutter build ipa --release --export-method=development
      # ※本番用なら --export-method=app-store に変更

    # 5. 生成されたIPAファイルをGitHubからダウンロードできるように保存
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: build/ios/ipa/*.ipa
